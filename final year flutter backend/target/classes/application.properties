# Server Port
server.port=8080

# Database Configuration (Persistent file-based H2 Database)
spring.datasource.url=jdbc:h2:file:./data/newsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Spring Security OAuth2 Clients (Supports environment variables with fallback placeholders)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:387899639418-pq85d7b10bq8iik8v0u1lu9bis2g4rs0.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# JWT Configurations (Secret must be at least 256 bits / 32 bytes)
app.jwt.secret=4567890123456789012345678901234567890123456789012345678901234567
app.jwt.expiration-ms=86400000

# News API Configuration
news.api.key=cf63e904af574030b9282965ef22b635
news.api.base-url=https://newsapi.org/v2
