# Railway / production profile (activate with SPRING_PROFILES_ACTIVE=prod)

server.port=${PORT:8080}

# MySQL — set automatically when you link a Railway MySQL service
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# Secrets — set these in the Railway service Variables tab
app.google.client-ids=${GOOGLE_CLIENT_IDS}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

guardian.api.key=${GUARDIAN_API_KEY}
guardian.api.base-url=https://content.guardianapis.com
guardian.api.show-fields=headline,thumbnail,trailText,bodyText,byline

# Actuator (Railway health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
