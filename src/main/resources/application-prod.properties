# Railway / production profile (activate with SPRING_PROFILES_ACTIVE=prod)

server.port=${PORT:8080}

# JPA — DataSource is configured in RailwayDataSourceConfig
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

# Secrets (override in Railway Variables for production)
app.google.client-ids=${GOOGLE_CLIENT_IDS:387899639418-a9jsdmuis71ciqvu7buaf0iktq2g6usu.apps.googleusercontent.com,387899639418-pq85d7b10bq8iik8v0u1lu9bis2g4rs0.apps.googleusercontent.com}
app.jwt.secret=${JWT_SECRET:4567890123456789012345678901234567890123456789012345678901234567}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

guardian.api.key=${GUARDIAN_API_KEY:test}
guardian.api.base-url=https://content.guardianapis.com
guardian.api.show-fields=headline,thumbnail,trailText,bodyText,byline

# Actuator — liveness checks app process; readiness checks DB separately
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
