# Server Port
server.port=8080

# Database Configuration (Persistent file-based H2 Database)
spring.datasource.url=jdbc:h2:file:./data/newsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Google Sign-In (mobile app sends ID tokens; comma-separated OAuth client IDs to accept)
app.google.client-ids=387899639418-a9jsdmuis71ciqvu7buaf0iktq2g6usu.apps.googleusercontent.com,387899639418-pq85d7b10bq8iik8v0u1lu9bis2g4rs0.apps.googleusercontent.com

# JWT Configurations (Secret must be at least 256 bits / 32 bytes)
app.jwt.secret=4567890123456789012345678901234567890123456789012345678901234567
app.jwt.expiration-ms=86400000

# Guardian API Configuration
guardian.api.key=${GUARDIAN_API_KEY:test}
guardian.api.base-url=https://content.guardianapis.com
guardian.api.show-fields=headline,thumbnail,trailText,bodyText,byline



